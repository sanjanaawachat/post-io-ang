<div class="container mt-5">
  <div class="row">

      
      <div class="card h-100">
   
        <div class="card-header">
          <h2>Album {{ photoObj.id}}</h2>
        </div>

        <div class="card-body">
          <img 
            [src]="photoObj.url" 
            [alt]="photoObj.title"
          >
          <h4>{{ photoObj.title }}</h4>
          <p>{{photoObj.originalUrl}}</p>
          <p>{{photoObj.description}}</p>
        </div>

      </div>

    

  </div>
</div>
