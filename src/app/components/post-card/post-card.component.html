<div class="card h-100 shadow-sm border-0">

    <!-- TITLE -->
    <h5 class="fw-bold">
      {{ getdata?.title }}
    </h5>

    <!-- BODY -->
    <p class="text-muted">
      {{ getdata?.body | slice:0:120 }}...
    </p>

    <!-- FOOTER -->

      <small>User ID: {{ getdata?.userId }}</small>
